# DEF-012: CI so the test suite runs on every push/PR instead of only on
# developer machines. The raw dataset (data/raw/ipl_data.xlsx, 36 MB) is not
# committed; tests that need it self-skip (see their skipif markers), so CI
# covers the synthetic-data and unit-level suite.
name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest -q
